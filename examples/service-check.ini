# Reference config.
#
# Keep this file in sync with all valid [global] and [default] options.
# When adding a new runner/default option, document it here so this file remains
# useful as a complete config-writing template.

[global]
# Name used in notifications and Kuma messages. Defaults to the machine hostname.
# hostname=my-host

# JSON state path.
state_file=/var/lib/service-check/state.json

# Lock file path. Defaults to state_file plus .lock when omitted.
lock_file=/var/lib/service-check/state.lock

# Maximum wall-clock budget for one runner invocation before starting another check.
# Use 0 to disable the budget.
max_run_seconds=50

# Maximum time to wait for another process to release the state lock.
# Use 0 to wait indefinitely.
max_lock_hold_minutes=2

[default]
# Local notification command template. The rendered message is appended as the
# final command argument. Leave unset to disable local notifications by default.
# notify_cmd=/usr/local/bin/telegram-notify --level {notify_level}

# Default interval for check sections that omit interval_minutes.
interval_minutes=5

# Default network/API timeout used by checks that support timeout_seconds.
timeout_seconds=2

# Immediate retries after CRIT/UNKNOWN results inside one runner invocation.
retries=1

# Seconds to wait between immediate retries.
retry_delay_seconds=1

# Consecutive failed due runs required before sending a problem notification.
fail_after=1

# Minutes before repeating a notification for an unresolved problem.
notify_repeat_after_minutes=60

# Notify when a check transitions from problem state back to OK.
notify_on_recovery=1

# Notify once when a check first returns OK. Usually enabled only per check.
notify_on_first_success=0

# Machine heartbeat example for Uptime Kuma Push monitors.
# If service-check stops running, the machine goes offline, or the network is
# unavailable, pushes stop and Kuma marks the monitor down.
#
# [machine_heartbeat]
# enabled=1
# check=heartbeat
# interval_minutes=1
# success_message={hostname} service-check heartbeat OK
# notify_on_first_success=1
# kuma_push_url=https://kuma.example.com/api/push/service-check-heartbeat-token
