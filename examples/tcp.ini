[global]
hostname=local-dev
state_file=./.service-check/state.json
lock_file=./.service-check/state.lock
notify_on_recovery=1

[default]
interval_minutes=1
timeout=2
retries=1
retry_delay=1
fail_after=1
notify_repeat_after_minutes=60

[example_tcp_open]
enabled=1
check=tcp_port
interval_minutes=1
host=127.0.0.1
port=80
timeout=2
# notify_topic=infra
# notify_cmd=/usr/local/bin/telegram-notify --level {notify_level} {notify_topic}
failure_message=TCP port {host}:{port} is down: {error}
success_message=TCP port {host}:{port} is reachable in {elapsed_ms}ms

[example_tcp_closed]
enabled=0
check=tcp_port
interval_minutes=1
host=127.0.0.1
port=1
timeout=2
failure_message=TCP port {host}:{port} is down: {error}
success_message=TCP port {host}:{port} is reachable in {elapsed_ms}ms
